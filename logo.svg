<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wave-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" /> <!-- Indigo -->
      <stop offset="100%" stop-color="#a855f7" /> <!-- Purple -->
    </linearGradient>
    <linearGradient id="wave-grad-2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" /> <!-- Blue -->
      <stop offset="100%" stop-color="#8b5cf6" /> <!-- Violet -->
    </linearGradient>
  </defs>
  <!-- Sombra base suave -->
  <path d="M15 50 C 25 75, 40 75, 50 50 C 60 25, 75 25, 85 50" stroke="rgba(0,0,0,0.1)" stroke-width="12" stroke-linecap="round" transform="translate(0, 4)"/>
  
  <!-- Ola Trasera (Opacidad menor) -->
  <path d="M15 65 C 25 90, 40 90, 50 65 C 60 40, 75 40, 85 65" stroke="url(#wave-grad-2)" stroke-width="12" stroke-linecap="round" opacity="0.5" />
  
  <!-- Ola Frontal (Color principal) -->
  <path d="M15 50 C 25 75, 40 75, 50 50 C 60 25, 75 25, 85 50" stroke="url(#wave-grad-1)" stroke-width="12" stroke-linecap="round" />
</svg>
